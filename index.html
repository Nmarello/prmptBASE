<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>prmptbase – Sora 2 Builder</title>
    <style>
      html,body { margin:0; padding:0; background:#fff; color:#111; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useMemo, useState, useEffect } = React;

      function hasWindow() { return typeof window !== "undefined" && typeof document !== "undefined"; }

      const Row = ({ style, children }) => (<div style={{ display: "flex", alignItems: "center", gap: 8, ...style }}>{children}</div>);
      const Col = ({ style, children }) => (<div style={{ display: "flex", flexDirection: "column", gap: 6, ...style }}>{children}</div>);
      const Card = ({ title, subtitle, children }) => (
        <div style={{ border: "1px solid #e5e7eb", borderRadius: 16, padding: 16, background: "#fff", boxShadow: "0 1px 2px rgba(0,0,0,0.04)" }}>
          {(title || subtitle) && (
            <div style={{ marginBottom: 10 }}>
              {title && <div style={{ fontWeight: 600, fontSize: 16 }}>{title}</div>}
              {subtitle && <div style={{ color: "#6b7280", fontSize: 12 }}>{subtitle}</div>}
            </div>
          )}
          {children}
        </div>
      );
      const Button = ({ children, style, ...props }) => (
        <button {...props} style={{ padding: "8px 12px", borderRadius: 10, border: "1px solid #e5e7eb", background: props.disabled ? "#f3f4f6" : "#f9fafb", cursor: props.disabled ? "not-allowed" : "pointer", boxShadow: "0 1px 2px rgba(0,0,0,0.04)", ...style }}>{children}</button>
      );
      const Input = (props) => (<input {...props} style={{ padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 8, outline: "none", width: "100%" }} />);
      const Textarea = (props) => (
        <textarea {...props} style={{ padding: "10px 12px", border: "1px solid #e5e7eb", borderRadius: 8, outline: "none", width: "100%", minHeight: 84, fontFamily: props.readOnly ? "ui-monospace, SFMono-Regular, Menlo, monospace" : undefined }} />
      );
      const Label = ({ children, htmlFor, style }) => (<label htmlFor={htmlFor} style={{ color: "#374151", fontSize: 13, ...style }}>{children}</label>);

      async function safeCopy(text) {
        try {
          if (hasWindow() && typeof navigator !== "undefined" && navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
            return true;
          }
        } catch {}
        try {
          if (!hasWindow()) return false;
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand && document.execCommand("copy");
          document.body.removeChild(ta);
          return true;
        } catch { return false; }
      }

      const PRESETS = {
        cinematic: {
          scene: "Blue-hour city street just after the rain; neon reflections on wet asphalt; light fog.",
          subject: "A solitary protagonist in a dark coat walks toward camera, subtle confident smile.",
          camera: "Wide establishing shot (35mm, low angle), slow dolly-in; at 2.5s cut to medium close-up (50mm).",
          lighting: "High contrast, soft practical neons, gentle rim light; cool shadows, warm highlights.",
          physics: "Light drizzle, steam vents from sidewalk, puddles ripple as footsteps land.",
          audio: "Ambient city hum, distant traffic, soft footsteps; no dialogue.",
          timing: "0.0–2.5s: wide dolly-in; 2.5–4.5s: medium CU; 4.5–5.0s: fade to black.",
          negatives: "No lens flare, no on-screen text, avoid Dutch angles.",
          size: "1280x720", seconds: 5, aspect: "16:9",
        }
      };

      function SoraPromptBuilder() {
        const [scene, setScene] = useState("");
        const [subject, setSubject] = useState("");
        const [cameraText, setCameraText] = useState("");
        const [lighting, setLighting] = useState("");
        const [physics, setPhysics] = useState("");
        const [audio, setAudio] = useState("");
        const [timing, setTiming] = useState("");
        const [negatives, setNegatives] = useState("No on-screen text; avoid lens flare; no abrupt camera shake.");

        const [enableDialogue, setEnableDialogue] = useState(false);
        const [dialogue, setDialogue] = useState("[Subject softly:] '…'");

        const prompt = useMemo(() => {
          const lines = [];
          if (scene) lines.push(`Scene / Setting\n${scene}`);
          if (subject) lines.push(`\nSubject & Action\n${subject}`);
          if (cameraText) lines.push(`\nCamera & Framing\n${cameraText}`);
          if (lighting) lines.push(`\nLighting & Color\n${lighting}`);
          if (physics) lines.push(`\nPhysics / Materials / Motion\n${physics}`);
          const audioBlock = [audio, enableDialogue && dialogue].filter(Boolean).join("\n");
          if (audioBlock) lines.push(`\nAudio / Dialogue / Soundscape\n${audioBlock}`);
          if (timing) lines.push(`\nTiming / Beats\n${timing}`);
          if (negatives) lines.push(`\nExclusions / Constraints\n${negatives}`);
          return lines.join("\n");
        }, [scene, subject, cameraText, lighting, physics, audio, timing, enableDialogue, dialogue, negatives]);

        return (
          <div style={{ maxWidth: 1000, margin: "0 auto", padding: 24, background: "#fff", minHeight: "100vh" }}>
            <h2>Sora 2 Prompt Template Builder</h2>
            <Card title="Scene / Setting">
              <Textarea value={scene} onChange={(e) => setScene(e.target.value)} />
            </Card>
            <Card title="Subject & Action">
              <Textarea value={subject} onChange={(e) => setSubject(e.target.value)} />
            </Card>
            <Card title="Camera & Framing">
              <Textarea value={cameraText} onChange={(e) => setCameraText(e.target.value)} />
            </Card>
            <Card title="Lighting & Color">
              <Textarea value={lighting} onChange={(e) => setLighting(e.target.value)} />
            </Card>
            <Card title="Generated Prompt">
              <Textarea readOnly value={prompt} />
            </Card>
          </div>
        );
      }

      window.SoraPromptBuilder = SoraPromptBuilder;
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(SoraPromptBuilder));
    </script>
  </body>
</html>
